version: "3.8"

services:
  pipeline:
    build: .
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: coingecko_db
      DB_USER: postgres
      DB_PASSWORD: December2003

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: coingecko_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: December2003
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/create_tables.sql:/docker-entrypoint-initdb.d/create_tables.sql

volumes:
  pgdata: